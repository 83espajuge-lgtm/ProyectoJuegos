<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Videodrome — Nivel 1: Bosque de Niebla · Nivel 3: El Espejismo de Otoño">
    <title>Videodrome — 2 Niveles</title>

    <!-- Google Fonts: pixel retro + typewriter for both levels -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Special+Elite&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>
<body>
    <div id="game-container" tabindex="0"></div>
    <script src="game.js"></script>
    <div id="error-box" style="display:none; position:fixed; top:0; left:0; right:0; background:#cc2222; color:white; padding:12px; z-index:9999; font-family:monospace; font-size:12px; max-height:40vh; overflow:auto;"></div>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            var box = document.getElementById('error-box');
            box.style.display = 'block';
            var stack = error && error.stack ? error.stack.replace(/\n/g,'<br>') : '';
            box.innerHTML += '<strong>Error:</strong> ' + message + '<br>Línea: ' + lineno + '<br><small>' + stack + '</small><hr>';
        };
    </script>
</body>
</html>
