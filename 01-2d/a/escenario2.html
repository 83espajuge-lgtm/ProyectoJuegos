<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escenario 2: Zona Industrial</title>

    <!-- Google Fonts for a moody, typewriter aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
        font-family: 'Special Elite', system-ui, -apple-system, sans-serif;
        color: #d0d0d0;
        overflow: hidden;
      }
      #game-container {
        position: relative;
        width: 95vw;
        height: 82vh;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 4px solid #333;
        border-radius: 8px;
        box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.9);
        background-color: #050505;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      .instructions {
        margin-top: 15px;
        text-align: center;
        font-size: 14px;
        color: #888;
        letter-spacing: 1px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }
      .instructions span {
        color: #ccc;
        font-weight: bold;
      }
    </style>

    <script src="phaser.min.js"></script>
  </head>
  <body>
    <div id="game-container"></div>
    <div class="instructions">
      Usa las <span>Flechas del Teclado</span> para moverte y saltar. Empuja la <span>Caja</span> sobre el <span>Botón</span> para abrir el portón (Presiona <span>R</span> para reiniciar).
    </div>
    <script>
      window.onerror = function (message, source, lineno, colno, error) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '10px';
        div.style.left = '10px';
        div.style.padding = '15px';
        div.style.background = 'rgba(220, 50, 50, 0.95)';
        div.style.color = '#fff';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '12px';
        div.style.zIndex = '99999';
        div.style.borderRadius = '5px';
        div.style.maxWidth = '90%';
        div.style.maxHeight = '90vh';
        div.style.overflowY = 'auto';
        div.style.boxShadow = '0 4px 15px rgba(0,0,0,0.5)';
        
        let stack = error && error.stack ? error.stack : 'No hay stack trace disponible';
        // Clean up the stack trace for easier reading on screen
        stack = stack.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");

        div.innerHTML = '<strong>Error Detectado:</strong><br>' + message + 
                        '<br><small>Archivo: ' + source + ' (Línea ' + lineno + ')</small>' +
                        '<br><br><strong>Stack Trace:</strong><br><div style="font-size:10px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 3px; max-height: 200px; overflow: auto; text-align: left;">' + stack + '</div>';
        document.body.appendChild(div);
        return false;
      };
    </script>
    <script src="main_escenario2.js?v=7"></script>
  </body>
</html>
